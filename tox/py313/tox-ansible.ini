
[tox]
; Change .tox directory
toxworkdir = {toxinidir}/../../.tox

[ansible]
skip =
    ; tox-ansible galaxy not support legacy roles
    galaxy
    ; tox-ansible sanity, unit, devel, milestone no need legacy roles
    sanity
    unit
    devel
    milestone
    ; only matching one interpreter
    py3.10
    py3.11
    py3.12
    ; py3.13
    py3.14

[testenv]
; Change commands working directory
changedir = {toxinidir}/../../

; Use the `dependency-groups` in pyproject.toml generated from
; the pixi.toml `feature` as dependencies.
dependency_groups =
    2.20: core220
    2.19: core219
    2.18: core218

; Pass environment variables to the test environment.
passenv =
    WINDOWS_TEST_HOST
    WINDOWS_TEST_PORT
    WINDOWS_TEST_USER
    WINDOWS_TEST_PASSWORD
    WINDOWS_TEST_TRANSPORT
    WINDOWS_TEST_SCHEME
    MACOS_TEST_BECOME_PASSWORD

; Skip ade collection build
commands_pre =
    pip freeze
    ; Fixed an issue where pytest-ansible only matched `git glob `:(glob)**/molecule/*/molecule.yml`
    python {toxinidir}/../../scripts/generate_tox_ansible_molecule.py create --scenario-name {env:MOLECULE_SCENARIO_NAME:default}

commands_post =
    python {toxinidir}/../../scripts/generate_tox_ansible_molecule.py delete --scenario-name {env:MOLECULE_SCENARIO_NAME:default}

; The environment variable `MOLECULE_GLOB` is used to discover Molecule test files
; The environment variables `XDG_CACHE_HOME` and `ANSIBLE_HOME` are used to isolate Molecule test files.
; The environment variable `ANSIBLE_ROLES_PATH` is used to resolve the issue of finding role projects.
;   Typically, `ansible_compat` will link the role symbol to the Ansible home roles dir.
setenv =
    2.20: MOLECULE_GLOB = {toxinidir}/../../molecule/{env:MOLECULE_SCENARIO_NAME:default}@core220/molecule.yml
    2.19: MOLECULE_GLOB = {toxinidir}/../../molecule/{env:MOLECULE_SCENARIO_NAME:default}@core219/molecule.yml
    2.18: MOLECULE_GLOB = {toxinidir}/../../molecule/{env:MOLECULE_SCENARIO_NAME:default}@core218/molecule.yml

    2.20: XDG_CACHE_HOME = {toxinidir}/../../molecule/core220/.cache
    2.19: XDG_CACHE_HOME = {toxinidir}/../../molecule/core219/.cache
    2.18: XDG_CACHE_HOME = {toxinidir}/../../molecule/core218/.cache

    2.20: ANSIBLE_HOME = {toxinidir}/../../molecule/core220/.ansible
    2.19: ANSIBLE_HOME = {toxinidir}/../../molecule/core219/.ansible
    2.18: ANSIBLE_HOME = {toxinidir}/../../molecule/core218/.ansible

    2.20: ANSIBLE_ROLES_PATH = {toxinidir}/../../molecule/core220/.ansible/roles
    2.19: ANSIBLE_ROLES_PATH = {toxinidir}/../../molecule/core219/.ansible/roles
    2.18: ANSIBLE_ROLES_PATH = {toxinidir}/../../molecule/core218/.ansible/roles

    MOLECULE_SCENARIO_NAME = {env:MOLECULE_SCENARIO_NAME:default}
