[feature.ansible-core-2-9.pypi-dependencies]
molecule = { version = "<5", extras = ["docker"]}
molecule-docker = "<=1.1.0"
paramiko = "*"
flake8 = "*"
yamllint = "*"
ansible = ">=2.9.0,<2.10.0"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-lint = "<=5.1.3"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-compat = "<=2.2.7"
# fix dependencies `rich` break change
# see https://github.com/ansible/ansible-lint/issues/1795
rich = "==10.11.0"
jmespath = "*"
pywinrm = "==0.4.3"
# fix https://github.com/docker/docker-py/issues/3256
requests = "<=2.32.0"

[feature.ansible-core-2-10.pypi-dependencies]
molecule = { version = "<5", extras = ["docker"]}
paramiko = "*"
flake8 = "*"
yamllint = "*"
# BUG in 2.10.17
# fix `ImportError: cannot import name 'should_retry_error' from 'ansible.galaxy.api'`
ansible-base = "==2.10.16"
ansible = ">=3.0.0,<4.0.0"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-lint = "<=5.1.3"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-compat = "<=2.2.7"
# fix dependencies `rich` break change
#  see https://github.com/ansible/ansible-lint/issues/1795
rich = "==10.11.0"
jmespath = "*"
pywinrm = "==0.4.3"
# fix https://github.com/docker/docker-py/issues/3256
requests = "<=2.32.0"

