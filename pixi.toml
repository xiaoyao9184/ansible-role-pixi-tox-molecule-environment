[workspace]
name = "ansible-role-pixi-tox-molecule-environment"
channels = ["conda-forge"]
platforms = ["linux-64"]

[feature.py35.dependencies]
python = "3.5.*"
pip = "*"

[feature.py36.dependencies]
python = "3.6.*"
pip = "*"

[feature.py37.dependencies]
python = "3.7.*"
pip = "*"

[feature.py38.dependencies]
python = "3.8.*"
pip = "*"

[feature.py39.dependencies]
python = "3.9.*"
