[environments]
py35 = { features = ["py35"], no-default-feature = true }
py36 = { features = ["py36"], no-default-feature = true }
py37 = { features = ["py37"], no-default-feature = true }
py38 = { features = ["py38"], no-default-feature = true }
py39 = { features = ["py39"], no-default-feature = true }
py310 = { features = ["py310"], no-default-feature = true }
py311 = { features = ["py311"], no-default-feature = true }
py312 = { features = ["py312"], no-default-feature = true }
py313 = { features = ["py313"], no-default-feature = true }
py314 = { features = ["py314"], no-default-feature = true }

core29 = { features = ["ansible-core-2-9", "py38"], no-default-feature = true }
core210 = { features = ["ansible-core-2-10", "py39"], no-default-feature = true }
core211 = { features = ["ansible-core-2-11", "py39"], no-default-feature = true }
core212 = { features = ["ansible-core-2-12", "py310"], no-default-feature = true }
core213 = { features = ["ansible-core-2-13", "py310"], no-default-feature = true }
core214 = { features = ["ansible-core-2-14", "py311"], no-default-feature = true }
core215 = { features = ["ansible-core-2-15", "py311"], no-default-feature = true }
core216 = { features = ["ansible-core-2-16", "py312"], no-default-feature = true }
core217 = { features = ["ansible-core-2-17", "py312"], no-default-feature = true }
core218 = { features = ["ansible-core-2-18", "py313"], no-default-feature = true }
core219 = { features = ["ansible-core-2-19", "py313"], no-default-feature = true }
core220 = { features = ["ansible-core-2-20", "py314"], no-default-feature = true }

# for scripts `generate_tox_deps`
default = { features = ["py314"] }
