tox = { cmd = "tox -c tox/py310/tox.ini", depends-on = ["generate-tox-deps"] }
generate-tox-ansible-galaxy = "pixi run -e default python scripts/generate_tox_ansible_galaxy.py --galaxy-output tox/py310/galaxy.yml"
tox-ansible = { cmd = "tox --ansible -c tox/py310/tox-ansible.ini", depends-on = ["generate-tox-deps", "generate-tox-ansible-galaxy"] }

