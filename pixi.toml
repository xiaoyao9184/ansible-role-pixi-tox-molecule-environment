[feature.ansible-core-2-9.pypi-dependencies]
molecule = { version = "<5", extras = ["docker"]}
molecule-docker = "<=1.1.0"
paramiko = "*"
flake8 = "*"
yamllint = "*"
ansible = ">=2.9.0,<2.10.0"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-lint = "<=5.1.3"
# last support ansible-base is ansible-lint <= 5.1.3
ansible-compat = "<=2.2.7"
# fix dependencies `rich` break change
# see https://github.com/ansible/ansible-lint/issues/1795
rich = "==10.11.0"
jmespath = "*"
pywinrm = "==0.4.3"
# fix https://github.com/docker/docker-py/issues/3256
requests = "<=2.32.0"

[feature.ansible-core-2-9.tasks.molecule]
cmd = "molecule"

[feature.ansible-core-2-9.tasks.molecule.env]
ANSIBLE_CONFIG = "$PIXI_PROJECT_ROOT/molecule/ansible.old-galaxy.cfg"
MOLECULE_GLOB = "molecule/core29/*/molecule.yml"
XDG_CACHE_HOME = "$PIXI_PROJECT_ROOT/molecule/core29/.cache"
ANSIBLE_HOME = "$PIXI_PROJECT_ROOT/molecule/core29/.ansible"
ANSIBLE_ROLES_PATH = "$PIXI_PROJECT_ROOT/molecule/core29/.ansible/roles"

[feature.ansible-core-2-10.pypi-dependencies]
