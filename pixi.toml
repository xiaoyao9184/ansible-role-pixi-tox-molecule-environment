[workspace]
name = "ansible-role-pixi-tox-molecule-environment"
channels = ["conda-forge"]
platforms = ["linux-64"]

[feature.py35.dependencies]
python = "3.5.*"
pip = "*"
# cant use pypi dependencies with py35
tox = "*"

[feature.py35.tasks]
generate-tox-deps = "echo 'py35 does not use dependencies defined in pixi'"
tox = { cmd = "tox -c tox/py35/tox.ini", depends-on = ["generate-tox-deps"] }

