[feature.py38.pypi-dependencies]
tox = "*"

[feature.py38.tasks]
generate-tox-deps = "pixi run -e default python scripts/generate_tox_deps.py --pyproject-output tox/py38/pyproject.toml"
tox = { cmd = "tox -c tox/py38/tox.ini", depends-on = ["generate-tox-deps"] }

